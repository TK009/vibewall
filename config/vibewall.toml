port = 7777
host = "0.0.0.0"
pipeline_timeout = 120  # seconds; set high enough for interactive "ask" prompts

[validators.npm_blocklist]
action = "block"

[validators.npm_allowlist]
action = "block"

[validators.npm_registry]
action = "warn"
cache_ttl = 86400

[validators.npm_existence]
action = "block"

[validators.npm_typosquat]
action = "warn"
max_distance = 2

[validators.npm_age]
action = "block"
min_days = 7
missing_date = "fail"

[validators.npm_downloads]
action = "warn"
min_weekly = 10
cache_ttl = 86400

[validators.npm_advisories]
action = "block"
severity_low = "allow"
severity_medium = "warn"
severity_high = "warn"
severity_critical = "ask-block"
cache_ttl = 3600

[validators.url_blocklist]
action = "block"

[validators.url_allowlist]
action = "block"

[validators.url_dns]
action = "block"

[validators.url_domain_age]
action = "block"
min_days = 30
cache_ttl = 604800

[validators.pypi_blocklist]
action = "block"

[validators.pypi_allowlist]
action = "block"

[validators.pypi_registry]
action = "warn"
cache_ttl = 86400

[validators.pypi_existence]
action = "block"

[validators.pypi_typosquat]
action = "warn"
max_distance = 2

[validators.pypi_age]
action = "block"
min_days = 7
missing_date = "fail"

[validators.pypi_downloads]
action = "warn"
min_weekly = 10
cache_ttl = 86400

[validators.pypi_advisories]
action = "block"
severity_low = "allow"
severity_medium = "warn"
severity_high = "warn"
severity_critical = "ask-block"
cache_ttl = 3600

[notifications]
# enabled = true        # auto-detect notify-send on PATH
# blocked = true        # notify on blocked requests
# warned = true         # notify on warned requests
# ask = true            # interactive ask-mode notifications
# expire_ms = 10000     # notification timeout in ms

[cache]
default_ttl = 3600
max_entries = 50000
