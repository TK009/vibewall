services:
  vibewall:
    build: .
    ports:
      - "7777:7777"
    volumes:
      - certs:/certs
      - ./config:/app/config

  # Example agent container that routes through vibewall
  agent:
    image: node:20-slim
    environment:
      - HTTP_PROXY=http://vibewall:7777
      - HTTPS_PROXY=http://vibewall:7777
      - NODE_EXTRA_CA_CERTS=/certs/mitmproxy-ca-cert.pem
      - npm_config_cafile=/certs/mitmproxy-ca-cert.pem
    volumes:
      - certs:/certs:ro
    depends_on:
      vibewall:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        cp /certs/mitmproxy-ca-cert.pem /usr/local/share/ca-certificates/mitmproxy.crt
        update-ca-certificates
        exec sleep infinity

volumes:
  certs:
